
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ptGIGI</title>
  <style>
:root {
  --bg: #0b0e14;
  --panel: #121826;
  --panel-2: #0f1523;
  --text: #e6edf3;
  --muted: #9aa7b2;
  --brand: #8ab4f8;
  --accent: #a78bfa;
  --danger: #ef4444;
  --success: #34d399;
  --warning: #f59e0b;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; padding: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
  background: radial-gradient(1200px 800px at 70% -20%, #1b2240 0%, var(--bg) 60%);
  color: var(--text);
}

.hidden { display: none !important; }
.muted { color: var(--muted); }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: linear-gradient(90deg, #0f172a, #111827);
  position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #1f2937;
}
.brand { display: flex; gap: 12px; align-items: baseline; }
.logo { font-weight: 800; letter-spacing: 0.5px; font-size: 20px; color: var(--brand); }
.tag { color: var(--muted); font-size: 13px; }
.top-actions { display: flex; gap: 8px; }

.container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }

.card {
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid #1f2937; border-radius: 14px; padding: 16px 16px 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
}
.card h2, .card h3, .card h4 { margin: 8px 0 12px; }

.link-btn, button {
  background: #1f2937; border: 1px solid #334155; color: var(--text);
  padding: 10px 14px; border-radius: 10px; cursor: pointer; transition: 0.15s ease;
}
.link-btn:hover, button:hover { transform: translateY(-1px); border-color: #475569; }
.secondary { background: #0b1220; border-color: #273249; }
.danger { background: #220f11; border-color: #3a0f12; color: #fca5a5; }

label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
input, select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #273249; background: #0c1220; color: var(--text); }
form { display: grid; gap: 10px; }

.profiles-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 16px; }
.auth { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; border: 1px solid #1f2937; }
.hint { font-size: 12px; color: var(--muted); }

.player-select .player-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.selected-players { display: flex; gap: 8px; flex-wrap: wrap; min-height: 36px; }
.profiles-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.profile-card { background: #0e1423; border: 1px solid #273249; padding: 10px; border-radius: 10px; display: grid; gap: 6px; }
.profile-card .title { font-size: 12px; color: var(--muted); }
.profile-card .level { display: inline-flex; align-items: center; gap: 8px; }
.level-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); display: inline-block; }

.scoreboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
.score-card { background: #0e1220; border: 1px solid #273249; border-radius: 12px; padding: 10px; display: grid; gap: 6px; }
.score-top { display: flex; justify-content: space-between; align-items: center; }
.score-points { font-weight: 700; color: #f8fafc; }
.score-bust { color: #fda4af; font-weight: 600; }

.game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.event-banner { padding: 10px; border-radius: 10px; border: 1px dashed #334155; }
.dice-skin { font-size: 12px; color: var(--muted); }

.turn-area { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; align-items: start; }
.dice-area { background: #0e1423; border: 1px solid #273249; border-radius: 12px; padding: 12px; }
.dice-3d-group { min-height: 120px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.die {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(180deg, #0d1322, #0a0f1d);
  border: 1px solid #263149; position: relative; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 10px 30px rgba(0,0,0,0.35);
}
.die::after { content: ""; position: absolute; inset: 1px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); }
.die .pips { position: absolute; inset: 0; display: grid; place-items: center; color: #94a3b8; font-weight: 700; }
.die.super { outline: 2px solid var(--accent); }
.die.mega { outline: 2px solid var(--brand); }

.results { background: #0e1423; border: 1px solid #273249; border-radius: 12px; padding: 12px; }
.pulls-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.pull-card { background: #0b1120; border: 1px solid #23314d; border-radius: 12px; padding: 8px; text-align: center; position: relative; overflow: hidden; }
.pull-card .name { font-size: 12px; color: var(--muted); }
.pull-card img { width: 80px; height: 80px; image-rendering: pixelated; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.4)); }
.pull-card .rarity { position: absolute; top: 6px; right: 6px; font-size: 11px; }
.pull-card .legendary { color: #60a5fa; }
.pull-card .gmax { color: #fbbf24; }
.pull-card .shiny { color: #f472b6; }
.pull-card .secret { color: #c084fc; }
.pull-card .rainbow { color: #34d399; }

.pulls-log { margin-top: 10px; max-height: 160px; overflow: auto; font-size: 12px; color: var(--muted); background: #0b1120; border: 1px solid #1b2741; padding: 8px; border-radius: 10px; }

.status-bar { margin-top: 12px; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; }

/* Modals */
.modal { border: 1px solid #334155; border-radius: 12px; padding: 0; width: min(900px, 92vw); background: linear-gradient(180deg, #0a0f1d, #0c1322); color: var(--text); }
.modal form { padding: 16px; }
.modal h3 { margin-top: 0; }
.trophy-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.tab { background: #0b1220; border: 1px solid #273249; padding: 6px 10px; border-radius: 8px; color: var(--text); cursor: pointer; }
.tab.active { border-color: var(--brand); color: var(--brand); }
.trophy-content { min-height: 260px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.dex-card { background: #0b1120; border: 1px solid #23314d; border-radius: 10px; padding: 8px; text-align: center; }

.trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.trade-list { min-height: 200px; border: 1px dashed #31405f; border-radius: 10px; padding: 8px; }
.trade-actions { display: flex; justify-content: flex-end; margin-top: 8px; }

.storage-dump { background: #0b1120; border: 1px solid #1b2741; padding: 10px; border-radius: 10px; max-height: 250px; overflow: auto; }

@media (max-width: 900px) {
  .profiles-grid { grid-template-columns: 1fr; }
  .turn-area { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="logo">ptGIGI</span>
      <span class="tag">Pokémon Dice — hit exactly 100</span>
    </div>
    <nav class="top-actions">
      <button id="openTrophiesBtn" class="link-btn">Trophies</button>
      <button id="openPokedexBtn" class="link-btn">Pokédex</button>
      <button id="openTradeBtn" class="link-btn">Trade</button>
      <button id="openDevBtn" class="link-btn">Dev</button>
    </nav>
  </header>

  <main class="container">
    <!-- Profile/Login Section -->
    <section id="profileSection" class="card">
      <h2>Profiles</h2>
      <div class="profiles-grid">
        <div class="auth">
          <h3>Register</h3>
          <form id="registerForm">
            <label>Username<input id="regUsername" autocomplete="username" required /></label>
            <label>Password<input id="regPassword" type="password" autocomplete="new-password" required /></label>
            <button type="submit">Create Profile</button>
          </form>
          <div class="hint">Profiles persist locally. Log in with the same username to recover stats.</div>
        </div>
        <div class="auth">
          <h3>Login</h3>
          <form id="loginForm">
            <label>Username<input id="loginUsername" autocomplete="username" required /></label>
            <label>Password<input id="loginPassword" type="password" autocomplete="current-password" required /></label>
            <button type="submit">Login</button>
          </form>
        </div>
        <div class="player-select">
          <h3>Selected Players</h3>
          <div id="selectedPlayers" class="selected-players"></div>
          <div class="player-actions">
            <button id="startGameBtn" disabled>Start Game</button>
            <button id="clearSelectionBtn" class="secondary">Clear</button>
          </div>
          <h4>All Profiles</h4>
          <div id="profilesList" class="profiles-list"></div>
        </div>
      </div>
    </section>

    <!-- Game Section -->
    <section id="gameSection" class="card hidden">
      <div class="game-header">
        <div class="event-banner hidden" id="eventBanner"></div>
        <div class="dice-skin" id="diceSkinIndicator"></div>
      </div>

      <div id="scoreboard" class="scoreboard"></div>

      <div class="turn-area">
        <div class="dice-area">
          <div id="dice3d" class="dice-3d-group"></div>
          <div class="dice-controls">
            <button id="rollBtn">Roll Dice</button>
            <span id="turnInfo" class="muted"></span>
          </div>
        </div>
        <div class="results">
          <h3>Pulls</h3>
          <div id="pullsGrid" class="pulls-grid"></div>
          <div id="pullsLog" class="pulls-log"></div>
        </div>
      </div>

      <div id="statusBar" class="status-bar"></div>
    </section>
  </main>

  <!-- Modals -->
  <dialog id="trophiesModal" class="modal">
    <form method="dialog">
      <h3>Trophy Case</h3>
      <div class="trophy-tabs">
        <button data-tab="rainbow" class="tab active">Rainbow</button>
        <button data-tab="secret" class="tab">Secret</button>
        <button data-tab="shiny" class="tab">Shiny</button>
      </div>
      <div id="trophiesContent" class="trophy-content"></div>
      <menu>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>

  <dialog id="pokedexModal" class="modal">
    <form method="dialog">
      <h3>Pokédex</h3>
      <div id="pokedexContent" class="dex-grid"></div>
      <menu>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>

  <dialog id="tradeModal" class="modal">
    <form method="dialog" id="tradeForm">
      <h3>Trade Center</h3>
      <div class="trade-grid">
        <div class="trade-col">
          <h4>Player A</h4>
          <select id="tradePlayerA"></select>
          <div id="tradeAList" class="trade-list"></div>
        </div>
        <div class="trade-col">
          <h4>Player B</h4>
          <select id="tradePlayerB"></select>
          <div id="tradeBList" class="trade-list"></div>
        </div>
      </div>
      <div class="trade-actions">
        <button id="confirmTradeBtn" disabled>Confirm Trade</button>
      </div>
      <menu>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>

  <dialog id="devModal" class="modal">
    <form method="dialog" id="devForm">
      <h3>Dev Tools</h3>
      <section class="dev-section">
        <h4>Events</h4>
        <div class="row" style="gap:8px; align-items:center;">
          <select id="devEventSelect" style="flex:1;"></select>
          <button id="devTriggerEventBtn" class="secondary">Trigger</button>
          <button id="devClearEventBtn" class="secondary">Clear</button>
        </div>
      </section>
      <section class="dev-section">
        <h4>Data</h4>
        <div class="row">
          <button id="devResetGameBtn" class="danger">Reset Current Game</button>
          <button id="devResetProfilesBtn" class="danger">Reset All Profiles</button>
        </div>
        <div class="row">
          <button id="devDumpStorageBtn" class="secondary">View Storage</button>
        </div>
        <pre id="devStorageDump" class="storage-dump"></pre>
      </section>
      <menu>
        <button value="cancel">Close</button>
      </menu>
    </form>
  </dialog>

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}
function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
function randInt(minInclusive, maxInclusive) { return Math.floor(Math.random() * (maxInclusive - minInclusive + 1)) + minInclusive; }
function chanceOneIn(denominator) { return randInt(1, denominator) === 1; }
function formatPercent(value) { return `${(value * 100).toFixed(2)}%`; }

function loadPlayers() {

function upsertPlayer(username, password) {
  const players = loadPlayers();
  const existing = players.find((p) => p.username === username);
  if (existing) {
    if (existing.password !== password) throw new Error('Incorrect password');
    return existing;
  }
  const newPlayer = {
    username,
    password,
    level: 1,
    xp: 0,
    wins: 0,
    titles: [],
    equippedDiceSkin: null,
    trophies: { shiny: [], secret: [], rainbow: [] },
    pokedex: { shiny: [], secret: [], rainbow: [] }
  };
  players.push(newPlayer);
  savePlayers(players);
  return newPlayer;
}

function loadThemeTracker() { return loadJSON(STORAGE_KEYS.themeTracker, { active: null, lastCheckedTurn: 0 }); }
function saveThemeTracker(tt) { saveJSON(STORAGE_KEYS.themeTracker, tt); }

function maybeTriggerEvent(game) {
  const tracker = loadThemeTracker();
  if (!game.active) return tracker;
  if (game.turnCount % 6 !== 0) return tracker;

  // If an event is active, decrement remaining
  if (tracker.active) {
    tracker.active.remainingTurns -= 1;
    if (tracker.active.remainingTurns <= 0) tracker.active = null;
  }

  // Consider triggering a new event (only if none active)
  if (!tracker.active) {
    const tryOrder = ["Mythical", "Legendary", "Epic", "Rare", "Uncommon", "Common"]; // roll rarest first
    for (const tier of tryOrder) {
      const t = EVENT_TIERS[tier];
      if (Math.random() < t.chance) {
        const candidates = THEMES.filter((th) => th.tier === tier);
        const theme = candidates[randInt(0, candidates.length - 1)];
        const dur = theme.duration ?? EVENT_TIERS[theme.tier].duration;
        tracker.active = { ...theme, remainingTurns: dur };
        break;
      }
    }
  }
  saveThemeTracker(tracker);
  return tracker;
}

function getShinyDenominatorWithBoosts(base, themeActive) {
  if (!themeActive || !themeActive.boosts) return base;
  const shinyBoost = themeActive.boosts.shiny;
  if (shinyBoost === 'x2') return Math.max(1, Math.floor(base / 2));
  if (shinyBoost === 'x3') return Math.max(1, Math.floor(base / 3));
  return base;
}

function getTagRatesWithBoosts(themeActive) {
  const base = { ...BASE_TAG_RATES };
  if (!themeActive || !themeActive.boosts) return base;
  const boosts = themeActive.boosts;
  return {
    legendary: Math.min(0.5, Math.max(0, base.legendary + (boosts.legendary || 0))),
    mythical: base.mythical, // no event boost per spec
    gmax: Math.min(0.5, Math.max(0, base.gmax + (boosts.gmax || 0)))
  };
}

// Map helper for quick lookup
const EVENT_TiersMap = EVENT_TIERS;

// ------------------------------
// Rarity and Pull Generation
// ------------------------------
function generatePokemonPull(themeActive) {
  // Random ID in 1..1010 (excluding gen 9 if needed; we include all for demo)
  const id = randInt(1, 1010);

  // Determine special tags
  const tagRates = getTagRatesWithBoosts(themeActive);
  const isLegendary = Math.random() < tagRates.legendary;
  const isMythical = Math.random() < tagRates.mythical;
  const isGmax = Math.random() < tagRates.gmax;

  // Rarity resolution: shiny -> secret -> rainbow (mutually exclusive)
  const shinyDen = getShinyDenominatorWithBoosts(RARITY_DENOMINATORS.shiny, themeActive);
  const isShiny = chanceOneIn(shinyDen);
  let rarity = null;
  if (isShiny) rarity = 'shiny';
  else if (chanceOneIn(RARITY_DENOMINATORS.secret)) rarity = 'secret';
  else if (chanceOneIn(RARITY_DENOMINATORS.rainbow)) rarity = 'rainbow';

  // Scoring
  let points = 0;
  if (isLegendary || isMythical) points += 1;
  if (isGmax) points += 2;
  if (rarity === 'shiny') points += 5;

  return {
    id,
    sprite: POKEMON_SPRITE_URL(id),
    isLegendary,
    isMythical,
    isGmax,
    rarity, // null | 'shiny' | 'secret' | 'rainbow'
    points
  };
}

function addTrophyAndDex(username, pull) {
  if (!pull.rarity) return; // only rare pulls are trophy/dex worthy
  const players = loadPlayers();
  const p = players.find((pl) => pl.username === username);
  if (!p) return;

  const list = p.trophies[pull.rarity];
  if (!list.includes(pull.id)) list.push(pull.id);

  const dexList = p.pokedex[pull.rarity];
  if (!dexList.includes(pull.id)) dexList.push(pull.id);

  // Titles can be recomputed here (stub)
  p.titles = computeTitles(p);

  savePlayers(players);
}

function computeTitles(p) {
  const titles = [];
  if (p.wins >= 1) titles.push('Rookie Champion');
  if (p.wins >= 5) titles.push('Seasoned Victor');
  if (p.trophies.shiny.length >= 50) titles.push('Shiny Hunter');
  if (p.trophies.secret.length >= 25) titles.push('Arcane Seeker');
  if (p.trophies.rainbow.length >= 10) titles.push('Prismatic Legend');
  return titles;
}

// ------------------------------
// Game Loop
// ------------------------------
function getCurrentPlayer(game) { return game.players[game.turnIndex]; }

function nextTurn(game) {
  // Advance to next non-busted player
  let steps = 0;
  do {
    game.turnIndex = (game.turnIndex + 1) % game.players.length;
    steps += 1;
  } while (game.players[game.turnIndex].bust && steps <= game.players.length + 1);
  game.turnCount += 1;
  saveGame(game);
}

function checkVictoryOrBust(game, player) {
  if (player.score === 100) {
    game.active = false;
    saveGame(game);
    alert(`${player.username} hits exactly 100! Victory!`);
    // increment wins
    const players = loadPlayers();
    const profile = players.find((p) => p.username === player.username);
    if (profile) {
      profile.wins += 1;
      profile.titles = computeTitles(profile);
      savePlayers(players);
    }
    return true;
  }
  if (player.score > 100) {
    player.bust = true;
    saveGame(game);
    return false;
  }
  return false;
}

function determineBonusDice(player) {
  const result = { super25: null, mega50: null, super75: null };
  if (!player.superUsed25 && player.score >= 25) { result.super25 = randInt(1, 12); player.superUsed25 = true; }
  if (!player.megaUsed50 && player.score >= 50) { result.mega50 = randInt(1, 20); player.megaUsed50 = true; }
  if (!player.superUsed75 && player.score >= 75) { result.super75 = randInt(1, 12); player.superUsed75 = true; }
  return result;
}

function handleRoll() {
  const game = loadGame();
  if (!game || !game.active) return;
  const player = getCurrentPlayer(game);
  if (player.bust) { nextTurn(game); renderAll(); return; }

  // Base five dice
  const diceValues = [randInt(1, 6), randInt(1, 6), randInt(1, 6), randInt(1, 6), randInt(1, 6)];

  // Event check
  const tracker = maybeTriggerEvent(game);

  // Bonus dice triggers based on current score BEFORE adding new points
  const bonus = determineBonusDice(player);

  // Render dice visuals
  renderDice(diceValues, bonus);

  // Total number of Pokémon to generate
  const total = diceValues.reduce((a, b) => a + b, 0) + (bonus.super25 || 0) + (bonus.mega50 || 0) + (bonus.super75 || 0);

  // Generate pulls
  const pulls = [];
  for (let i = 0; i < total; i++) {
    const pull = generatePokemonPull(tracker.active);
    pulls.push(pull);
    player.score += pull.points;
    if (pull.rarity) addTrophyAndDex(player.username, pull);
  }

  // Legendary suspense: if any legendary/mythical, delay reveal simulation (3s). We'll just log then show.
  const hasLegendary = pulls.some((p) => p.isLegendary || p.isMythical);

  // Update state and UI
  saveGame(game);
  renderScoreboard(game);
  renderEventBanner(tracker);
  el.turnInfo.textContent = `${player.username} rolled ${diceValues.join(', ')} ${bonus.super25 ? '+ d12' : ''} ${bonus.mega50 ? '+ d20' : ''} ${bonus.super75 ? '+ d12' : ''} → ${total} pulls`;

  function reveal() {
    renderPulls(pulls);
    logPulls(pulls, player.username);

    const ended = checkVictoryOrBust(game, player);
    if (!ended) {
      nextTurn(game);
      renderAll();
    } else {
      renderAll();
    }
  }

  if (hasLegendary) {
    el.pullsGrid.innerHTML = '<div class="muted">Legendary aura building... ✨</div>';
    setTimeout(reveal, 3000);
  } else {
    reveal();
  }
}

// ------------------------------
// Trophies / Pokédex UI
// ------------------------------
function openTrophies() {
  const players = loadPlayers();
  // For simplicity, show current selected user 0 if in game else list of players
  const active = loadGame();
  const username = active?.players?.[active.turnIndex]?.username || uiState.selected[0] || players[0]?.username;
  const p = players.find((pl) => pl.username === username);
  if (!p) return;
  function renderTab(kind) {
    const list = p.trophies[kind];
    el.trophiesContent.innerHTML = list.map((id) => `<div class="dex-card"><img src="${POKEMON_SPRITE_URL(id)}" alt="#${id}"><div>#${id}</div></div>`).join('');
  }
  // Default shiny as last tab; but preserve selected
  renderTab('rainbow');
  el.trophiesModal.showModal();
  el.trophiesModal.querySelectorAll('.tab').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      el.trophiesModal.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab(btn.getAttribute('data-tab'));
    });
  });
}

function openPokedex() {
  const players = loadPlayers();
  const active = loadGame();
  const username = active?.players?.[active.turnIndex]?.username || uiState.selected[0] || players[0]?.username;
  const p = players.find((pl) => pl.username === username);
  if (!p) return;
  const kinds = ['rainbow','secret','shiny'];
  el.pokedexContent.innerHTML = kinds.map((k) => {
    const list = p.pokedex[k];
    return `<div><div style="margin:6px 0; font-weight:600;">${k.toUpperCase()}</div><div class="dex-grid">${list.map((id) => `<div class="dex-card"><img src="${POKEMON_SPRITE_URL(id)}" alt="#${id}"><div>#${id}</div></div>`).join('')}</div></div>`;
  }).join('');
  el.pokedexModal.showModal();
}

// ------------------------------
// Trade (basic stub)
// ------------------------------
function openTrade() {
  const players = loadPlayers();
  const usernames = players.map((p) => p.username);
  el.tradePlayerA.innerHTML = usernames.map((u) => `<option>${u}</option>`).join('');
  el.tradePlayerB.innerHTML = usernames.map((u) => `<option>${u}</option>`).join('');
  function renderLists() {
    const a = players.find((p) => p.username === el.tradePlayerA.value);
    const b = players.find((p) => p.username === el.tradePlayerB.value);
    el.tradeAList.innerHTML = renderTradeList(a);
    el.tradeBList.innerHTML = renderTradeList(b);
    wireTradeSelection();
  }
  function renderTradeList(p) {
    function itemize(kind) {
      return p.trophies[kind].map((id) => `<label style="display:block; font-size:12px;"><input type="checkbox" data-user="${p.username}" data-kind="${kind}" value="${id}" /> ${kind} #${id}</label>`).join('');
    }
    return `<div>RAINBOW<hr>${itemize('rainbow')}<hr>SECRET<hr>${itemize('secret')}<hr>SHINY<hr>${itemize('shiny')}</div>`;
  }
  function wireTradeSelection() {
    const boxes = el.tradeModal.querySelectorAll('input[type="checkbox"]');
    boxes.forEach((box) => box.addEventListener('change', () => {
      const any = Array.from(boxes).some((b) => b.checked);
      el.confirmTradeBtn.disabled = !any;
    }));
  }
  el.confirmTradeBtn.onclick = () => {
    // Collect selections
    const boxes = el.tradeModal.querySelectorAll('input[type="checkbox"]:checked');
    const changes = {};
    boxes.forEach((b) => {
      const user = b.getAttribute('data-user');
      const kind = b.getAttribute('data-kind');
      const id = parseInt(b.value, 10);
      changes[user] = changes[user] || { shiny: [], secret: [], rainbow: [] };
      changes[user][kind].push(id);
    });
    // Requires two players selected
    const involved = Object.keys(changes);
    if (involved.length !== 2) { alert('Select trophies from exactly two players'); return; }
    const [ua, ub] = involved;
    const db = loadPlayers();
    const pa = db.find((p) => p.username === ua);
    const pb = db.find((p) => p.username === ub);
    // Remove from owners and add to the other
    for (const kind of ['shiny','secret','rainbow']) {
      for (const id of changes[ua][kind]) {
        pa.trophies[kind] = pa.trophies[kind].filter((x) => x !== id);
        if (!pb.trophies[kind].includes(id)) pb.trophies[kind].push(id);
      }
      for (const id of changes[ub][kind]) {
        pb.trophies[kind] = pb.trophies[kind].filter((x) => x !== id);
        if (!pa.trophies[kind].includes(id)) pa.trophies[kind].push(id);
      }
    }
    // Recompute titles
    pa.titles = computeTitles(pa);
    pb.titles = computeTitles(pb);
    savePlayers(db);
    alert('Trade complete. Titles recalculated.');
    el.tradeModal.close();
  };
  el.tradePlayerA.onchange = renderLists;
  el.tradePlayerB.onchange = renderLists;
  renderLists();
  el.tradeModal.showModal();
}

// ------------------------------
// Dev Tools
// ------------------------------
function openDev() {
  // Populate event select
  el.devEventSelect.innerHTML = THEMES.map((t, i) => `<option value="${i}">${t.emoji} ${t.name} [${t.tier}]</option>`).join('');
  el.devTriggerEventBtn.onclick = (e) => {
    e.preventDefault();
    const idx = parseInt(el.devEventSelect.value, 10);
    const theme = THEMES[idx];
    const dur = theme.duration ?? EVENT_TIERS[theme.tier].duration;
    const tracker = { active: { ...theme, remainingTurns: dur }, lastCheckedTurn: 0 };
    saveThemeTracker(tracker);
    renderEventBanner(tracker);
  };
  el.devClearEventBtn.onclick = (e) => {
    e.preventDefault();
    const tracker = loadThemeTracker();
    tracker.active = null;
    saveThemeTracker(tracker);
    renderEventBanner(tracker);
  };
  el.devResetGameBtn.onclick = (e) => {
    e.preventDefault();
    localStorage.removeItem(STORAGE_KEYS.currentGame);
    alert('Current game reset.');
    renderAll();
  };
  el.devResetProfilesBtn.onclick = (e) => {
    e.preventDefault();
    localStorage.removeItem(STORAGE_KEYS.players);
    alert('All profiles removed.');
    uiState.selected = [];
    renderProfilesUI();
  };
  el.devDumpStorageBtn.onclick = (e) => {
    e.preventDefault();
    const dump = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      dump[key] = localStorage.getItem(key);
    }
    el.devStorageDump.textContent = JSON.stringify(dump, null, 2);
  };
  el.devModal.showModal();
}

// ------------------------------
// Wiring
// ------------------------------
function renderAll() {
  const game = loadGame();
  if (game && game.active) {
    el.profileSection.classList.add('hidden');
    el.gameSection.classList.remove('hidden');
    renderScoreboard(game);
    renderEventBanner(loadThemeTracker());
    const pl = getCurrentPlayer(game);
    el.turnInfo.textContent = `${pl.username}'s turn`;
  } else {
    el.gameSection.classList.add('hidden');
    el.profileSection.classList.remove('hidden');
    renderProfilesUI();
  }
}

function startGame() {
  const game = createNewGame(uiState.selected.slice(0));
  el.profileSection.classList.add('hidden');
  el.gameSection.classList.remove('hidden');
  renderScoreboard(game);
  renderEventBanner(loadThemeTracker());
}

function init() {
  // Profile forms
  el.registerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const u = el.regUsername.value.trim();
    const p = el.regPassword.value.trim();
    if (!u || !p) return;
    try {
      upsertPlayer(u, p);
      el.regUsername.value = '';
      el.regPassword.value = '';
      renderProfilesUI();
    } catch (err) {
      alert(err.message);
    }
  });
  el.loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const u = el.loginUsername.value.trim();
    const p = el.loginPassword.value.trim();
    try {
      upsertPlayer(u, p);
      if (!uiState.selected.includes(u)) uiState.selected.push(u);
      renderProfilesUI();
    } catch (err) {
      alert(err.message);
    }
  });
  el.startGameBtn.addEventListener('click', startGame);
  el.clearSelectionBtn.addEventListener('click', () => { uiState.selected = []; renderProfilesUI(); });

  // Game
  el.rollBtn.addEventListener('click', handleRoll);

  // Modals
  el.openTrophiesBtn.addEventListener('click', openTrophies);
  el.openPokedexBtn.addEventListener('click', openPokedex);
  el.openTradeBtn.addEventListener('click', openTrade);
  el.openDevBtn.addEventListener('click', openDev);

  renderAll();
}

init();
</script>
